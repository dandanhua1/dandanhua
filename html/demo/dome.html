<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
body{
    margin: 0;
    padding: 30px;
    background: #fff;
}
.box{
    width: 200px;
    height: 200px;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 60px;
    color: red; 
}
.btn-group{
    display: inline-flex;
    margin-top: 20px;
}
.btn-group button{
    padding: 8px 16px;
    font-size: 16px;
    border: none;
    background: #f3f4f6;
    cursor: pointer;
}
.btn-group .sep{
    width: 1px;
    background: #d1d5db;
    margin: 6px 0;
}
.btn-group button:first-child{
    border-radius: 6px 0 0 6px;
}
.btn-group button:last-child{
    border-radius: 0 6px 6px 0;
}
.btn-group button:hover{
    background: #e5e7eb;
}
.icon-btn{
    width: 40px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>
<body>
    <div class="box">abc</div>
    <div class="btn-group">
        <button>Button</button>
        <div class="sep"></div>
        <button class="icon-btn">+</button>
    </div>
    <script src="demo.js"></script>
</body>
</html>
